<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Log | Security Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Mono&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal:  #39F0D9;
            --amber: #FF9800;
            --red:   #f44336;
            --bg1:   #2D3033;
            --bg2:   #1E3B2C;
            --panel: rgba(45,48,51,0.10);
            --border:rgba(255,255,255,0.05);
            --gray:  #607D8B;
            --mono:  'Space Mono', monospace;
            --head:  'Rajdhani', sans-serif;
            --body:  'Work Sans', sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--body);
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
            background-image: url('data:image/svg+xml,%3Csvg width="100%25" height="100%25" xmlns="http://www.w3.org/2000/svg"%3E%3Cdefs%3E%3Cpattern id="tp" patternUnits="userSpaceOnUse" width="200" height="200"%3E%3Cpath d="M0,100 Q50,50 100,100 Q150,150 200,100 M0,50 Q50,0 100,50 Q150,100 200,50 M0,150 Q50,100 100,150 Q150,200 200,150" fill="none" stroke="rgba(57,240,217,0.07)" stroke-width="0.5"/%3E%3C/pattern%3E%3C/defs%3E%3Crect width="100%25" height="100%25" fill="url(%23tp)"/%3E%3C/svg%3E');
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
            pointer-events: none;
            z-index: 999;
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
        }

        /* Breadcrumb */
        .breadcrumb {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--gray);
            letter-spacing: 1.5px;
            margin-bottom: 1.2rem;
            opacity: 0.7;
        }
        .breadcrumb a { color: var(--teal); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb::before { content: '> '; color: var(--teal); }

        /* Painel */
        .panel {
            position: relative;
            background: var(--panel);
            backdrop-filter: blur(20px) contrast(120%);
            border: 1px solid var(--border);
            box-shadow: 0 4px 30px rgba(0,0,0,.20), 0 0 50px rgba(57,240,217,.08), inset 0 0 15px rgba(57,240,217,.04);
            border-radius: 10px;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            display: block;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
        }

        /* Scanner */
        .scanner {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--teal), transparent);
            animation: scan 3s linear infinite;
            opacity: .5;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes scan {
            0%   { top: 0;    opacity: 0; }
            5%   { opacity: 0.5; }
            95%  { opacity: 0.5; }
            100% { top: 100%; opacity: 0; }
        }

        .panel-header {
            padding: 14px 22px;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(57,240,217,0.08);
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .panel-header h1 {
            font-family: var(--head);
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .panel-header h1 span { color: var(--teal); }

        .log-id {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--gray);
            letter-spacing: 1px;
        }

        /* Stamp */
        .stamp {
            font-family: var(--mono);
            font-size: 0.52rem;
            color: rgba(255,152,0,.28);
            border: 1px solid rgba(255,152,0,.22);
            padding: .15rem .45rem;
            transform: rotate(12deg);
            letter-spacing: 1px;
            margin-left: auto;
        }

        /* Form */
        .edit-form { padding: 22px; }

        .fg {
            margin-bottom: 16px;
        }

        .fg label {
            display: block;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--gray);
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .fg input,
        .fg select {
            width: 100%;
            padding: 9px 12px;
            background: rgba(45,48,51,0.40);
            border: 1px solid rgba(96,125,139,0.28);
            border-radius: 5px;
            color: #fff;
            font-family: var(--body);
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .fg input:focus,
        .fg select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(57,240,217,0.08);
        }

        .fg select option { background: #1E3B2C; }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .btn-salvar {
            flex: 1;
            padding: 10px;
            background: rgba(57,240,217,0.12);
            color: var(--teal);
            border: 1px solid rgba(57,240,217,0.28);
            border-radius: 5px;
            font-family: var(--head);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-salvar:hover { background:rgba(57,240,217,0.20); box-shadow:0 0 14px rgba(57,240,217,0.18); transform:translateY(-1px); }

        .btn-cancelar {
            padding: 10px 20px;
            background: rgba(244,67,54,0.08);
            color: #ff6b6b;
            border: 1px solid rgba(244,67,54,0.25);
            border-radius: 5px;
            font-family: var(--head);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        .btn-cancelar:hover { background:rgba(244,67,54,0.16); box-shadow:0 0 14px rgba(244,67,54,0.15); }
    </style>
</head>
<body>

<div class="wrap">

    <div class="breadcrumb">
        <a href="/">Dashboard</a> &rsaquo; Editar Log
    </div>

    <div class="panel">
        <div class="scanner"></div>

        <div class="panel-header">
            <h1>Editar <span>Log</span></h1>
            <span class="log-id">ID #{{ log[0] }}</span>
            <div class="stamp">MODO EDIÇÃO</div>
        </div>

        <form action="/atualizar/{{ log[0] }}" method="POST" class="edit-form">

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                <div class="fg">
                    <label>Data</label>
                    <input type="text" name="date" value="{{ log[1] }}">
                </div>
                <div class="fg">
                    <label>Hora</label>
                    <input type="text" name="hour" value="{{ log[2] }}">
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                <div class="fg">
                    <label>Tipo</label>
                    <select name="type">
                        <option value="INFO"    {% if log[3] == 'INFO'    %}selected{% endif %}>INFO</option>
                        <option value="WARNING" {% if log[3] == 'WARNING' %}selected{% endif %}>WARNING</option>
                        <option value="ERROR"   {% if log[3] == 'ERROR'   %}selected{% endif %}>ERROR</option>
                    </select>
                </div>
                <div class="fg">
                    <label>IP</label>
                    <input type="text" name="ip" value="{{ log[4] }}">
                </div>
            </div>

            <div class="fg">
                <label>Mensagem</label>
                <input type="text" name="message" value="{{ log[5] }}">
            </div>

            <div class="actions">
                <button type="submit" class="btn-salvar">&#10003; Salvar</button>
                <a href="/" class="btn-cancelar">&#10007; Cancelar</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
