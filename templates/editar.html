1<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Log</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a2416;
            color: #c8d8b0;
            padding: 30px;
        }
        h1 { color: #7ab648; }
        input, select {
            background-color: #1f2d1a;
            color: #c8d8b0;
            border: 1px solid #2d4a20;
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            border-radius: 4px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-edit { background-color: #4a7c2f; color: #c8d8b0; }
        .btn-delete { background-color: #8b2020; color: #c8d8b0; }

    </style>
</head>
<body>
<h1>Editar Log</h1>
<form action="/atualizar/{{ log[0] }}" method="POST">
    <label>Data:</label>
    <input type="text" name="date" value="{{ log[1] }}">
    <label>Hora:</label>
    <input type="text" name="hour" value="{{ log[2] }}">
    <label>Tipo:</label>
    <select name="type">
        <option value="INFO" {% if log[3] == 'INFO' %}selected{% endif %}>INFO</option>
        <option value="WARNING" {% if log[3] == 'WARNING' %}selected{% endif %}>WARNING</option>
        <option value="ERROR" {% if log[3] == 'ERROR' %}selected{% endif %}>ERROR</option>
    </select>
    <label>IP:</label>
    <input type="text" name="ip" value="{{ log[4] }}">
    <label>Mensagem:</label>
    <input type="text" name="message" value="{{ log[5] }}">
    <button type="submit" class="btn btn-edit">Salvar</button>
    <a href="/" class="btn btn-delete">Cancelar</a>
</form>
</body>
</html>
