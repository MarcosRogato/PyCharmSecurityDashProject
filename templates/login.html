<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0f0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            opacity: 0.05;
        }

        .login-box {
            position: relative;
            z-index: 1;
            background: #0f1a0f;
            padding: 40px;
            border-radius: 6px;
            border: 1px solid #2d4a20;
            width: 380px;
            box-shadow: 0 0 30px #00ff4122;
        }

        h1 {
            color: #7ab648;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="login-box">
    <h1>Login</h1>

    {% if erro %}
        <p style="color: red;">{{ erro }}</p>
    {% endif %}

    <form method="POST">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>

        <br>

        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <br>

        <button type="submit">Entrar</button>
    </form>
</div>
</body>
</html>
